name: CI Docker SSR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build Docker image
        run: docker build -t datamatika-ssr:ci .

      # compose.yml references .env.production (not committed). CI uses the example template so
      # `docker compose config` can validate YAML without real secrets.
      - name: Validate Docker Compose config
        run: cp .env.production.example .env.production && docker compose config
